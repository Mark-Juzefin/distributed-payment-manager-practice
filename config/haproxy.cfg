global
    maxconn 100

defaults
    mode tcp
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    timeout check   5s

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    http-request use-service prometheus-exporter if { path /metrics }

frontend pg_rw
    bind *:5440
    default_backend pg_primary

frontend pg_ro
    bind *:5441
    default_backend pg_replicas

backend pg_primary
    mode tcp
    option httpchk
    http-check send meth GET uri /primary
    http-check expect status 200
    default-server inter 2s fall 2 rise 1 on-marked-down shutdown-sessions
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008

backend pg_replicas
    mode tcp
    balance roundrobin
    option httpchk
    http-check send meth GET uri /replica
    http-check expect status 200
    default-server inter 2s fall 2 rise 1 on-marked-down shutdown-sessions
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008
