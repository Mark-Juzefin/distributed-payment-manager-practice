services:
  # New microservices architecture
  paymanager-service:
    image: payment-paymanager
    container_name: payment-paymanager
    profiles:
      - prod
    networks:
      - backend
    build:
      context: .
      dockerfile: Dockerfile.paymanager
    depends_on:
      haproxy:
        condition: service_started
      opensearch-node1:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - env/common.env
      - env/endpoints.docker.env
      - env/paymanager.env
    environment:
      - PORT=${API_PORT}
      - WEBHOOK_MODE=kafka
    ports:
      - "${API_PORT}:${API_PORT}"

  ingest-service:
    image: payment-ingest
    container_name: payment-ingest
    profiles:
      - prod
    networks:
      - backend
    build:
      context: .
      dockerfile: Dockerfile.ingest
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file:
      - env/common.env
      - env/endpoints.docker.env
      - env/ingest.env
    environment:
      - PORT=${INGEST_PORT}
      - WEBHOOK_MODE=kafka
    ports:
      - "${INGEST_PORT}:${INGEST_PORT}"

  # Legacy monolith (backward compatibility)
  payment-app:
    image: payment-app
    container_name: payment-app
    profiles:
      - legacy
    networks:
      - backend
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      haproxy:
        condition: service_started
      opensearch-node1:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      - PG_URL=user=postgres password=secret host=db port=5432 dbname=payments sslmode=disable
      - OPENSEARCH_URLS=http://opensearch-node1:9200
      - KAFKA_BROKERS=kafka:29092
    ports:
      - "3000:3000"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    profiles:
      - prod
      - infra
    networks:
      - backend
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    profiles:
      - prod
      - infra
    networks:
      - backend
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    profiles:
      - prod
      - infra
    depends_on:
      kafka:
        condition: service_started
    networks:
      - backend
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready -b kafka:29092 1 30

      echo 'Creating topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic webhooks.orders --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic webhooks.disputes --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic webhooks.orders.dlq --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic webhooks.disputes.dlq --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic domain.events --partitions 3 --replication-factor 1

      echo 'Topics created:'
      kafka-topics --bootstrap-server kafka:29092 --list
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    profiles:
      - infra
    ports:
      - "8888:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - backend

  silvergate-mock:
    image: wiremock/wiremock:latest
    container_name: silvergate-mock
    profiles:
      - infra
    ports:
      - '8080:8080'
    volumes:
      - ./e2e/mappings:/home/wiremock/mappings
    entrypoint: ["/docker-entrypoint.sh", "--global-response-templating", "--disable-gzip", "--verbose"]

  opensearch-node1:
    image: opensearchproject/opensearch:3
    container_name: opensearch-node1
    profiles:
      - prod
      - infra
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.seed_hosts=opensearch-node1,opensearch-node2
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2
      - bootstrap.memory_lock=true  # along with the memlock settings below, disables swapping
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536  # maximum number of open files for the OpenSearch user, set to at least 65536 on modern systems
        hard: 65536
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600  # required for Performance Analyzer
    networks:
      - backend

  opensearch-node2:
    image: opensearchproject/opensearch:3
    container_name: opensearch-node2
    profiles:
      - prod
      - infra
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node2
      - discovery.seed_hosts=opensearch-node1,opensearch-node2
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true    # dev only
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data2:/usr/share/opensearch/data
    networks:
      - backend

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3
    container_name: opensearch-dashboards
    profiles:
      - prod
      - infra
    ports:
      - 5601:5601
    expose:
      - '5601'
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch-node1:9200","https://opensearch-node2:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"                                            # <<< add
    networks:
      - backend

  # Monitoring stack
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    profiles:
      - infra
    networks:
      - backend
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    profiles:
      - infra
    networks:
      - backend
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus


  # Patroni HA cluster (etcd + 3 identical PG nodes)
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: etcd
    hostname: etcd
    profiles:
      - infra
      - prod
    networks:
      - backend
    environment:
      ETCD_NAME: etcd
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: etcd=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: payments-cluster
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  patroni1:
    build:
      dockerfile: ./PG.Dockerfile
    container_name: patroni1
    hostname: patroni1
    profiles:
      - infra
      - prod
    networks:
      - backend
    environment:
      PATRONI_NAME: patroni1
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni1:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni1:5432
    ports:
      - '5442:5432'
      - '8008:8008'
    volumes:
      - patroni1-data:/var/lib/postgresql/data
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 60s

  patroni2:
    build:
      dockerfile: ./PG.Dockerfile
    container_name: patroni2
    hostname: patroni2
    profiles:
      - infra
    networks:
      - backend
    environment:
      PATRONI_NAME: patroni2
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni2:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni2:5432
    ports:
      - '5443:5432'
      - '8009:8008'
    volumes:
      - patroni2-data:/var/lib/postgresql/data
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 60s

  patroni3:
    build:
      dockerfile: ./PG.Dockerfile
    container_name: patroni3
    hostname: patroni3
    profiles:
      - infra
    networks:
      - backend
    environment:
      PATRONI_NAME: patroni3
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni3:8008
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni3:5432
    ports:
      - '5444:5432'
      - '8010:8008'
    volumes:
      - patroni3-data:/var/lib/postgresql/data
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 60s

  haproxy:
    image: haproxy:2.9
    container_name: haproxy
    profiles:
      - infra
    networks:
      - backend
    ports:
      - '5440:5440'
      - '5441:5441'
      - '8404:8404'
    volumes:
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      patroni1:
        condition: service_started
      patroni2:
        condition: service_started
      patroni3:
        condition: service_started

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    profiles:
      - infra
    networks:
      - backend
    ports:
      - '9187:9187'
    environment:
      DATA_SOURCE_URI: haproxy:5440/payments?sslmode=disable
      DATA_SOURCE_USER: postgres
      DATA_SOURCE_PASS: secret
    depends_on:
      haproxy:
        condition: service_started

volumes:
  patroni1-data:
  patroni2-data:
  patroni3-data:
  opensearch-data1:
  opensearch-data2:
  zookeeper-data:
  kafka-data:
  prometheus-data:
  grafana-data:

networks:
  backend:
  opensearch-net:
